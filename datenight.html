<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Pretty Girl 💖</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', 'Arial', sans-serif;
      background: linear-gradient(to bottom, #ffd6e7, #fff0f5);
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 40px;
      color: #ff66a3;
      font-size: 32px;
    }

    p {
      color: #666;
    }

    button {
      padding: 12px 22px;
      border: none;
      background: #ff66a3;
      color: white;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 4px 0 #cc4d80;
      transition: transform 0.1s;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    .garden {
      position: relative;
      width: 100%;
      height: 60vh;
    }

    .flower {
      position: absolute;
      bottom: 0;
      width: 50px;
      height: 50px;
      background: pink;
      border-radius: 50%;
      animation: pop 0.6s ease forwards;
    }

    .flower::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 70px;
      background: #66cc66;
      bottom: -70px;
      left: 18px;
      border-radius: 10px;
    }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .message {
      margin-top: 20px;
      font-size: 18px;
      color: #444;
      opacity: 0;
      transition: opacity 1s;
    }

    .show {
      opacity: 1;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: floatUp 3s linear forwards;
    }

    @keyframes floatUp {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-200px); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>Hi my pretty girl 💖</h1>
  <p>Click the button for a surprise hehe 🌸</p>

  <button onclick="giveFlowers()">Tap me 💕</button>

  <div class="garden" id="garden"></div>

  <div class="message" id="message">
    these are for you 💐<br>
    can't wait for our date night 🌙<br>
    you make everything feel soft and happy 💗
  </div>

  <script>
    function giveFlowers() {
      const garden = document.getElementById('garden');
      garden.innerHTML = '';

      for (let i = 0; i < 12; i++) {
        const flower = document.createElement('div');
        flower.classList.add('flower');

        flower.style.left = Math.random() * 90 + '%';
        flower.style.background = `hsl(${Math.random()*360}, 70%, 80%)`;

        garden.appendChild(flower);
      }

      // floating hearts (roblox cute vibe)
      for (let i = 0; i < 8; i++) {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '💗';

        heart.style.left = Math.random() * 90 + '%';
        heart.style.bottom = '0px';

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 3000);
      }

      document.getElementById('message').classList.add('show');
    }
  </script>

</body>
</html>
