<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Pretty Girl</title>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(to bottom, #1a0b12, #3a1426);
      color: #f5e6ea;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 70px;
      font-size: 36px;
      letter-spacing: 1px;
      color: #f2c7d1;
    }

    p {
      color: #e8cfd6;
      font-size: 17px;
    }

    button {
      padding: 14px 28px;
      border: none;
      background: #b23a5a;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 25px;
      transition: 0.25s ease;
    }

    button:hover {
      background: #8f2e49;
    }

    .bouquet {
      margin-top: 60px;
      display: none;
      animation: fadeIn 1.8s ease forwards;
    }

    .bouquet img {
      width: 220px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message {
      margin-top: 40px;
      font-size: 19px;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 2s ease;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .show {
      opacity: 1;
    }

    .light {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #f5ccd3;
      border-radius: 50%;
      opacity: 0.6;
      animation: floatUp 6s linear forwards;
    }

    @keyframes floatUp {
      from { transform: translateY(0); opacity: 0.6; }
      to { transform: translateY(-300px); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>for my pretty girl</h1>
  <p>tap below</p>

  <button onclick="showBouquet()">open</button>

  <div class="bouquet" id="bouquet">
    <img src="https://images.unsplash.com/photo-1597848212624-e8d3b5d3b4b5" alt="Carnation bouquet">
  </div>

  <div class="message" id="message">
    you're really making it hard for me to give you actual flowers.<br>
    but until then, have these instead.<br>
    i love you.
  </div>

  <script>
    function showBouquet() {
      document.getElementById('bouquet').style.display = 'block';
      document.getElementById('message').classList.add('show');

      for (let i = 0; i < 10; i++) {
        const light = document.createElement('div');
        light.classList.add('light');

        light.style.left = Math.random() * 100 + '%';
        light.style.bottom = '0px';

        document.body.appendChild(light);
        setTimeout(() => light.remove(), 6000);
      }
    }
  </script>

</body>
</html>
