<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Pretty Girl 💐</title>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(to bottom, #2b0a1a, #5a1f3d);
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 60px;
      font-size: 36px;
      color: #ffccd5;
    }

    p {
      color: #f8e1e7;
      font-size: 18px;
    }

    button {
      padding: 14px 26px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
      transition: 0.2s;
    }

    button:hover {
      background: #ff1e4d;
    }

    .bouquet {
      margin-top: 40px;
      display: none;
      animation: fadeIn 2s ease forwards;
    }

    .flower {
      font-size: 50px;
      display: inline-block;
      margin: 5px;
      animation: bloom 1s ease forwards;
    }

    @keyframes bloom {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .message {
      margin-top: 30px;
      font-size: 20px;
      opacity: 0;
      transition: opacity 2s;
    }

    .show {
      opacity: 1;
    }

    .sparkle {
      position: absolute;
      font-size: 14px;
      color: #ffd1dc;
      animation: floatUp 4s linear forwards;
    }

    @keyframes floatUp {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-300px); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>For my pretty girl 💐</h1>
  <p>tap below… i got something for you</p>

  <button onclick="showBouquet()">open bouquet ❤️</button>

  <div class="bouquet" id="bouquet">
    <div>
      🌸 🌸 🌸<br>
      🌸 🌹 🌸<br>
      🌸 🌸 🌸
    </div>
  </div>

  <div class="message" id="message">
    these carnations are for you 🌹<br>
    you make everything feel warm and real<br>
    can't wait to spend tonight with you ❤️
  </div>

  <script>
    function showBouquet() {
      document.getElementById('bouquet').style.display = 'block';
      document.getElementById('message').classList.add('show');

      // subtle romantic sparkles
      for (let i = 0; i < 12; i++) {
        const spark = document.createElement('div');
        spark.classList.add('sparkle');
        spark.innerHTML = '✨';

        spark.style.left = Math.random() * 100 + '%';
        spark.style.bottom = '0px';

        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 4000);
      }
    }
  </script>

</body>
</html>
